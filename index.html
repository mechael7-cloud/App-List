<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Font Awosome/css/all.min.css">
    <title>To Do</title>
</head>

<body>
    <header>
        <h1>To Do</h1>
        <button id="button-add">Add +</button>
    </header>
    <main>
        <section>
            <div class="place-text">
                <div class="place-title">
                    <p>Lorem ipsum dolor sit amet.</p>
                </div>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Vel, ad.</p>
            </div>
        </section>
        <div class="button-add">
            <button id="button-plus">+</button>
        </div>
        <div class="select-mode hidden" id="select-mode">
            <div class="list-head">
                <p>Select Mode</p>
                <button><i class="fas fa-x" id="delete-select-mode"></i></button>
            </div>
            <div class="list-main">
                <div class="text" id="mode-text">
                    <i class="fas fa-i"></i>
                    <p>Text</p>
                </div>
                <div class="list" id="mode-list">
                    <i class="fas fa-list-check"></i>
                    <p>List</p>
                </div>
            </div>
        </div>
        
    </main>
    <script src="script.js"></script>
</body>

</html>
