<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Font Awosome/css/all.min.css">
    <title>To Do</title>
</head>

<body>
    <header>
        <h1>To Do</h1>
        <button id="button-add">Add +</button>
    </header>
    <main>
        <section>
            
            <div class="place-list">
                <div class="place-list-title">
                    <p class="list-title">Lorem ipsum dolor sit amet.</p>
                    <button><i class="fas fa-x"></i></button>
                </div>
                <hr>
                <div class="listiner">
                    <ul>
                        <li class="place-list-checkbox">
                            <input type="checkbox">
                            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Pariatur, porro.</p>
                        </li>
                        <li class="place-list-checkbox">
                            <input type="checkbox">
                            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ratione, molestias! Soluta quia
                                est incidunt ipsam qui, quaerat ullam facere minus.</p>
                        </li>
                    </ul>
                </div>
            </div>

        </section>
        <div class="overlay" id="overlay">
            <div class="card-over" id="card-over">
                <div class="title-over">
                    <p id="title-card"></p>
                    <button id="close-over"><i class="fas fa-x"></i></button>
                </div>
                <hr>
                <div id="teks-card"></div>
            </div>

        </div>
        <div class="button-add">
            <button id="button-plus">+</button>
        </div>
        <div class="select-mode hidden" id="select-mode">
            <div class="list-head">
                <p>Select Mode</p>
                <button><i class="fas fa-x" id="delete-select-mode"></i></button>
            </div>
            <div class="list-main">
                <div class="text" id="mode-text">
                    <i class="fas fa-i"></i>
                    <p>Text</p>
                </div>
                <div class="list" id="mode-list">
                    <i class="fas fa-list-check"></i>
                    <p>List</p>
                </div>
            </div>
        </div>
        <div class="overlist" id="overlist">
            <div class="card-overlist" id="card-overlist">
                <div class="title-overlist">
                    <p id="title-listover"></p>
                    <button id="close-overlist"><i class="fas fa-x"></i></button>
                </div>
                <hr>
               <div class="raw-overlist">
                <input type="checkbox">
                <p id="text-overlist"></p>
               </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
